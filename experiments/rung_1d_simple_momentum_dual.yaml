# Rung 1d: 12-1 momentum, dual-softmax portfolio (TCNN's portfolio step)
# Same factor as rung 1, different portfolio. The 1 vs 1d gap isolates the
# portfolio-step effect alone (decile-sort vs dual-softmax) at fixed factor.

experiment_id: rung_1d_simple_momentum_dual

factor:
  type: simple_mom

portfolio:
  type: dual_softmax
  gross_leverage: 1.0

universe:
  filters:
    - in_top_2000
    - price_above_5
    - adtv_above_5m

rolling:
  start_year: 2010
  end_year:   2023
  train_years: 0
  val_years:   0

output_dir: outputs/rung_1d_simple_momentum_dual/
