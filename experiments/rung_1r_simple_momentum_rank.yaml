# Rung 1r: 12-1 momentum + dual-softmax on cross-sectional ranks
# Bounded ranks → no fat-tail concentration. Should approach decile-sort behavior.

experiment_id: rung_1r_simple_momentum_rank

factor:
  type: simple_mom

portfolio:
  type: dual_softmax_rank
  gross_leverage: 1.0

universe:
  filters: [in_top_2000, price_above_5, adtv_above_5m]

rolling:
  start_year: 2010
  end_year:   2023
  train_years: 0
  val_years:   0

output_dir: outputs/rung_1r_simple_momentum_rank/
