# Rung 1w: 12-1 momentum + dual-softmax with winsorized z-scores (cap at +/- 2.5)
# Tests whether dual-softmax becomes usable for hand-crafted momentum once we
# kill the fat-tail concentration via z-clipping.

experiment_id: rung_1w_simple_momentum_winsor

factor:
  type: simple_mom

portfolio:
  type: dual_softmax_winsor
  gross_leverage: 1.0

universe:
  filters: [in_top_2000, price_above_5, adtv_above_5m]

rolling:
  start_year: 2010
  end_year:   2023
  train_years: 0
  val_years:   0

output_dir: outputs/rung_1w_simple_momentum_winsor/
