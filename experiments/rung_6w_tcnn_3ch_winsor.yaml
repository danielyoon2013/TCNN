# Rung 6w: TCNN 3-channel (paper config: ret, vol_ewma, ret_norm) with WINSORIZED dual-softmax (z-cap = 2.5)
# Same architecture as rung 6; in-training portfolio mapping is winsorized.

experiment_id: rung_6w_tcnn_3ch_winsor

factor:
  type: tcnn
  in_ch: 3                     # ret, vol_ewma, ret_norm
  hidden: 48
  d: 96
  kernel_size: 5
  dilations: [1, 2, 4, 8, 16]
  dropout: 0.15
  num_heads: 4

portfolio:
  type: dual_softmax_winsor
  z_cap: 2.5
  gross_leverage: 1.0

universe:
  filters: [in_top_2000, price_above_5, adtv_above_5m]

training:
  loss: sharpe
  portfolio_for_loss: dual_softmax_winsor
  portfolio_z_cap: 2.5
  optimizer: adam
  lr: 8e-4
  weight_decay: 0.15
  max_epochs: 35
  patience: 10
  warmup_epochs: 7
  ma_window: 7
  batch_size: 15
  seeds: [0, 1, 2, 3, 4]

rolling:
  start_year: 2010
  end_year:   2023
  train_years: 8
  val_years:   2

eval_portfolios:
  - dual_softmax_winsor
  - decile_sort_ew
  - mvo_lw

output_dir: outputs/rung_6w_tcnn_3ch_winsor/
